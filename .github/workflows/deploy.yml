name: Deploy to Replit

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build
        env:
          NODE_ENV: production

      - name: Health check (post-deploy)
        run: |
          echo "Deploy completed. Health check endpoint: /api/health"
          echo "Run: curl https://your-replit-domain.replit.app/api/health"
